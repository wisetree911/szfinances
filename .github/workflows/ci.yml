name: CI

on:
  push:
    branches: [main, develop]
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest 

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v3
        with:
          python-version: "3.11"
          enable-cache: true

      - name: Install deps (locked)
        run: uv sync --dev --frozen

      - name: Ruff format check
        run: uv run ruff format --check backend

      - name: Ruff lint
        run: uv run ruff check backend

      - name: Hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: backend/Dockerfile

  mypy:
    runs-on: ubuntu-latest

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v3
        with:
          python-version: "3.11"
          enable-cache: true

      - name: install deps
        run: uv sync --dev --frozen

      - name: mypy check
        run: uv run mypy

  unit-tests:
    runs-on: ubuntu-latest
    needs: [lint, mypy]

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: set up uv
        uses: astral-sh/setup-uv@v3
        with:
          python-version: "3.11"
          enable-cache: true

      - name: install deps
        run: uv sync --dev --frozen

      - name: run unit tests
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/test_db
          SECRET_KEY: test-secret-key
          ALGORITHM: HS256
          ACCESS_TOKEN_EXPIRE_MINUTES: "15"
          REFRESH_TOKEN_EXPIRE_DAYS: "7"
          REDIS_URL: redis://localhost:6379/0
          REDIS_PRICES_CHANNEL: prices
        run: uv run pytest tests/unit -q

  api-tests:
    runs-on: ubuntu-latest
    needs: [lint, mypy]
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d test_db"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: set up uv
        uses: astral-sh/setup-uv@v3
        with:
          python-version: "3.11"
          enable-cache: true

      - name: install deps (locked)
        run: uv sync --dev --frozen

      - name: apply migrations
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/test_db
          SECRET_KEY: test-secret-key
          ALGORITHM: HS256
          ACCESS_TOKEN_EXPIRE_MINUTES: "15"
          REFRESH_TOKEN_EXPIRE_DAYS: "7"
          REDIS_URL: redis://localhost:6379/0
          REDIS_PRICES_CHANNEL: prices
        run: uv run alembic upgrade head

      - name: run API tests
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/test_db
          SECRET_KEY: test-secret-key
          ALGORITHM: HS256
          ACCESS_TOKEN_EXPIRE_MINUTES: "15"
          REFRESH_TOKEN_EXPIRE_DAYS: "7"
          REDIS_URL: redis://localhost:6379/0
          REDIS_PRICES_CHANNEL: prices
        run: uv run pytest tests/api -q
